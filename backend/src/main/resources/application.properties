server.port=1995

# H2 (local dev)
spring.datasource.url=jdbc:h2:mem:chatbot_db;DB_CLOSE_DELAY=-1
spring.datasource.username=vivek
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

logging.level.com.chatbot.portal=DEBUG

nebius.api.token=${NEBIUS_API_TOKEN:your-token-here}
nebius.api.url=https://api.studio.nebius.ai/v1/chat/completions
google.ai.api.key=${GOOGLE_AI_API_KEY:your-key-here}

jwt.secret=${JWT_SECRET:mySecretKey12345678901234567890123}
jwt.expiration=86400000
